<section class="victory">
  <div class="victory__trophy" aria-hidden="true">
    <!-- Stylised Libertadores trophy in SVG (placeholder) -->
    <svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="trophyGold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffe082" />
          <stop offset="55%" stop-color="#ffb547" />
          <stop offset="100%" stop-color="#b07a1f" />
        </linearGradient>
        <linearGradient id="trophyHighlight" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(255,255,255,0.6)" />
          <stop offset="50%" stop-color="rgba(255,255,255,0)" />
          <stop offset="100%" stop-color="rgba(0,0,0,0.2)" />
        </linearGradient>
      </defs>

      <!-- Base -->
      <rect x="55" y="245" width="90" height="20" rx="3" fill="url(#trophyGold)" />
      <rect x="50" y="240" width="100" height="10" rx="2" fill="url(#trophyGold)" />

      <!-- Stem -->
      <rect x="92" y="195" width="16" height="50" fill="url(#trophyGold)" />

      <!-- Cup body -->
      <path
        d="M55 60 Q55 180 100 200 Q145 180 145 60 Z"
        fill="url(#trophyGold)"
      />
      <path
        d="M55 60 Q55 180 100 200 Q145 180 145 60 Z"
        fill="url(#trophyHighlight)"
      />

      <!-- Cup rim -->
      <rect x="48" y="50" width="104" height="14" rx="3" fill="url(#trophyGold)" />

      <!-- Handles -->
      <path
        d="M48 70 Q20 80 25 130 Q30 145 55 130"
        fill="none"
        stroke="url(#trophyGold)"
        stroke-width="10"
        stroke-linecap="round"
      />
      <path
        d="M152 70 Q180 80 175 130 Q170 145 145 130"
        fill="none"
        stroke="url(#trophyGold)"
        stroke-width="10"
        stroke-linecap="round"
      />

      <!-- Star detail -->
      <polygon
        points="100,100 108,123 132,123 113,138 120,162 100,148 80,162 87,138 68,123 92,123"
        fill="#ffffff"
        opacity="0.85"
      />
    </svg>
  </div>

  <h1 class="victory__title">¡Ganaste la Libertadores!</h1>
  <p class="victory__subtitle">
    Tu equipo se quedó con la gloria continental.
  </p>

  <button type="button" class="btn" (click)="playAgain()">
    Jugar otra vez
  </button>
</section>
